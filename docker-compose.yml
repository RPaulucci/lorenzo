services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: lorenzo_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DOCKER_MYSQL_DATABASE:-math_reflex_db}
      MYSQL_USER: ${DOCKER_MYSQL_USER:-lorenzo_user}
      MYSQL_PASSWORD: ${DOCKER_MYSQL_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - webnetwork
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DOCKER_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js MVC Monolith App
  app:
    build: .
    container_name: lorenzo_app
    environment:
      - PORT=3005
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DOCKER_MYSQL_USER:-lorenzo_user}
      - DB_PASS=${DOCKER_MYSQL_PASSWORD}
      - DB_NAME=${DOCKER_MYSQL_DATABASE:-math_reflex_db}
      - DB_DIALECT=mysql
      - AUTH_API_BASE_URL=${AUTH_API_BASE_URL}
      - USE_MOCK_AUTH=${USE_MOCK_AUTH:-false}
      - DOCKER_APP_HOST=${DOCKER_APP_HOST}
      - ACCOUNT_URL=${ACCOUNT_URL}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      # Route requests for subdomain lorenzo.mysite.dev.br
      - "traefik.http.routers.lorenzo-app.rule=Host(`${DOCKER_APP_HOST:-lorenzo.mysite.dev.br}`)"
      - "traefik.http.routers.lorenzo-app.entrypoints=websecure"
      - "traefik.http.routers.lorenzo-app.tls=true"
      - "traefik.http.routers.lorenzo-app.tls.certresolver=myresolver"
      - "traefik.http.services.lorenzo-app.loadbalancer.server.port=3005"
      - "traefik.docker.network=repo-services_ms-network"
    networks:
      - webnetwork
      - repo-services_ms-network
    restart: always

networks:
  webnetwork:
    driver: bridge
  repo-services_ms-network:
    external: true

volumes:
  dbdata:
    driver: local
